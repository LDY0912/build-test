<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생역전! 로또 번호 추첨기</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333;
            --accent-color: #ffcc00;
            --btn-color: #007bff;
            --btn-hover: #0056b3;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .container {
            background: var(--container-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 { margin-bottom: 30px; font-size: 2rem; color: #222; }

        .balls-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            min-height: 60px;
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transform: scale(0);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ball.show { transform: scale(1); }

        /* 로또 번호별 색상 */
        .color-1 { background-color: #fbc400; } /* 1-10 */
        .color-2 { background-color: #69c8f2; } /* 11-20 */
        .color-3 { background-color: #ff7272; } /* 21-30 */
        .color-4 { background-color: #aaa; }    /* 31-40 */
        .color-5 { background-color: #b0d840; } /* 41-45 */

        .draw-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .draw-btn:hover { background-color: var(--btn-hover); }
        .draw-btn:active { transform: scale(0.98); }

        .history {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍀 로또 추첨기</h1>
        <div class="balls-container" id="balls">
            <!-- 공들이 여기에 생성됩니다 -->
        </div>
        <button class="draw-btn" id="draw-btn">번호 추첨하기</button>
        <div class="history" id="history">최근 추첨 번호가 여기에 표시됩니다.</div>
    </div>

    <script>
        const ballsContainer = document.getElementById('balls');
        const drawBtn = document.getElementById('draw-btn');
        const historyDiv = document.getElementById('history');

        function getBallColorClass(num) {
            if (num <= 10) return 'color-1';
            if (num <= 20) return 'color-2';
            if (num <= 30) return 'color-3';
            if (num <= 40) return 'color-4';
            return 'color-5';
        }

        function drawNumbers() {
            // 1~45 사이의 번호 6개 무작위 추출
            const numbers = [];
            while (numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            // 정렬
            numbers.sort((a, b) => a - b);

            // UI 업데이트
            ballsContainer.innerHTML = '';
            numbers.forEach((num, index) => {
                setTimeout(() => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${getBallColorClass(num)}`;
                    ball.textContent = num;
                    ballsContainer.appendChild(ball);
                    // 강제 리플로우 후 클래스 추가하여 애니메이션 실행
                    setTimeout(() => ball.classList.add('show'), 10);
                }, index * 150);
            });

            // 히스토리 추가
            const time = new Date().toLocaleTimeString();
            const historyItem = document.createElement('p');
            historyItem.textContent = `[${time}] ${numbers.join(', ')}`;
            if (historyDiv.firstChild && historyDiv.firstChild.nodeType === 3) {
                historyDiv.innerHTML = '';
            }
            historyDiv.prepend(historyItem);
        }

        drawBtn.addEventListener('click', drawNumbers);
    </script>
</body>
</html>
