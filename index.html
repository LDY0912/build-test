<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 소개 페이지</title>
    <style>
        :root {
            --bg-color: #f9f9f9;
            --section-bg: #ffffff;
            --text-color: #333333;
            --header-text: #2d3436;
            --accent-color: #0984e3;
            --shadow: rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --section-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --header-text: #ffffff;
            --accent-color: #74b9ff;
            --shadow: rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg-color);
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            text-align: center;
            padding: 50px 0;
            background: var(--section-bg);
            border-radius: 15px;
            box-shadow: 0 4px 6px var(--shadow);
            margin-bottom: 30px;
            position: relative;
        }

        h1 { margin: 0; color: var(--header-text); }
        
        section {
            background: var(--section-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 2px 4px var(--shadow);
            margin-bottom: 20px;
        }

        h2 { border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; color: var(--accent-color); }
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 10px; }
        
        .contact-links a {
            display: inline-block;
            margin-right: 15px;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }
        .contact-links a:hover { text-decoration: underline; }

        /* 테마 토글 버튼 스타일 */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .theme-toggle:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <header>
        <button class="theme-toggle" id="theme-toggle">다크 모드</button>
        <h1>안녕하세요, [이름]입니다! 👋</h1>
        <p>열정적인 개발자 / 디자이너 / 학생</p>
    </header>

    <section>
        <h2>소개</h2>
        <p>여기에 본인에 대한 간단한 소개글을 작성하세요. 어떤 일을 하고 있는지, 어떤 것에 관심이 있는지 적으면 좋습니다.</p>
    </section>

    <section>
        <h2>기술 스택</h2>
        <ul>
            <li>✅ HTML / CSS / JavaScript</li>
            <li>✅ React / Vue.js</li>
            <li>✅ Python / Node.js</li>
        </ul>
    </section>

    <section>
        <h2>연락처</h2>
        <div class="contact-links">
            <a href="mailto:email@example.com">📧 이메일 보내기</a>
            <a href="https://github.com" target="_blank">💻 GitHub</a>
            <a href="https://blog.com" target="_blank">📝 블로그</a>
        </div>
    </section>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const body = document.documentElement;
        
        // 초기 테마 설정 확인
        const savedTheme = localStorage.getItem('theme') || 'light';
        body.setAttribute('data-theme', savedTheme);
        updateButtonText(savedTheme);

        toggleBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateButtonText(newTheme);
        });

        function updateButtonText(theme) {
            toggleBtn.textContent = theme === 'light' ? '다크 모드' : '화이트 모드';
        }
    </script>

</body>
</html>
