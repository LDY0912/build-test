<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 - 나를 닮은 동물은?</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            margin-bottom: -50px;
        }

        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        header p { font-size: 1.1rem; opacity: 0.9; }

        main {
            width: 90%;
            max-width: 600px;
            z-index: 10;
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 40px;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
            text-align: center;
        }

        /* AI 테스트 스타일 */
        .upload-area {
            border: 3px dashed #dfe6e9;
            border-radius: 20px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            margin-bottom: 20px;
        }
        .upload-area:hover { border-color: var(--primary-color); background: #f1f0ff; }
        
        #image-preview {
            width: 100%;
            max-height: 400px;
            border-radius: 15px;
            display: none;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }

        #result-container {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            background: #f8f9fa;
            display: none;
        }
        .result-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; }
        .result-message { font-size: 1.1rem; color: var(--primary-color); margin-bottom: 10px; }

        /* 로또 서비스 (부가 기능) */
        .lotto-mini {
            background: #f1f2f6;
            padding: 20px;
            border-radius: 20px;
            margin-top: 50px;
        }
        .balls { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
        .ball {
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 0.9rem; font-weight: bold; color: white;
            transform: scale(0); transition: transform 0.3s;
        }
        .ball.show { transform: scale(1); }
        .c1 { background: #fbc400; } .c2 { background: #69c8f2; }
        .c3 { background: #ff7272; } .c4 { background: #aaa; } .c5 { background: #b0d840; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-weight: bold;">AI 인공지능 모델 불러오는 중...</p>
    </div>

    <header>
        <h1>🐾 AI 동물상 테스트</h1>
        <p>인공지능이 분석하는 나의 얼굴상! 나는 어떤 동물을 닮았을까?</p>
    </header>

    <main>
        <section class="section-card">
            <div class="upload-area" onclick="document.getElementById('image-selector').click()">
                <div id="upload-label">
                    <span style="font-size: 3rem;">📸</span>
                    <p>사진을 클릭하여 업로드하세요</p>
                    <p style="font-size: 0.8rem; color: #999;">(사진은 어디에도 저장되지 않으니 안심하세요)</p>
                </div>
                <img id="image-preview" src="" alt="미리보기">
            </div>
            <input type="file" id="image-selector" accept="image/*" style="display:none;">
            
            <button id="predict-btn" class="btn" disabled>결과 확인하기</button>

            <div id="result-container">
                <div class="result-title" id="result-title"></div>
                <div class="result-message" id="result-message"></div>
                <div id="label-container"></div>
            </div>
        </section>

        <section class="section-card lotto-mini">
            <h3>🎰 행운의 로또 번호 추첨</h3>
            <div class="balls" id="balls"></div>
            <button onclick="drawLotto()" style="background: #2f3542; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">행운 받기</button>
        </section>

        <section class="section-card">
            <h3>🤝 제휴 및 문의</h3>
            <form action="https://formspree.io/f/xreoagkr" method="POST" style="text-align: left;">
                <input type="email" name="email" placeholder="이메일 주소" style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd;" required>
                <textarea name="message" placeholder="내용을 입력하세요" style="width: 100%; padding: 12px; height: 100px; border-radius: 8px; border: 1px solid #ddd;" required></textarea>
                <button type="submit" class="btn" style="margin-top: 10px; padding: 12px;">보내기</button>
            </form>
        </section>

        <div class="section-card">
            <div id="disqus_thread"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/EvFQgzXK7/";
        let model, maxPredictions;

        // 모델 로드
        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
            document.getElementById('loading-overlay').style.display = 'none';
        }
        init();

        // 이미지 핸들링
        const imageSelector = document.getElementById('image-selector');
        const imagePreview = document.getElementById('image-preview');
        const uploadLabel = document.getElementById('upload-label');
        const predictBtn = document.getElementById('predict-btn');

        imageSelector.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imagePreview.src = event.target.result;
                    imagePreview.style.display = 'block';
                    uploadLabel.style.display = 'none';
                    predictBtn.disabled = false;
                    document.getElementById('result-container').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        // 예측 실행
        predictBtn.addEventListener('click', async () => {
            predictBtn.innerText = "분석 중...";
            predictBtn.disabled = true;

            const prediction = await model.predict(imagePreview);
            prediction.sort((a, b) => b.probability - a.probability);

            const best = prediction[0];
            const resultContainer = document.getElementById('result-container');
            const resultTitle = document.getElementById('result-title');
            const resultMessage = document.getElementById('result-message');
            
            resultContainer.style.display = 'block';
            
            // 결과 메시지 커스텀
            let animalEmoji = best.className.includes("강아지") ? "🐶" : "🐱";
            resultTitle.innerHTML = `${animalEmoji} 당신은 <strong>${best.className}상</strong>입니다!`;
            resultMessage.innerText = `인공지능이 분석한 결과, ${best.className}를 닮을 확률이 ${(best.probability * 100).toFixed(1)}%로 가장 높습니다.`;

            predictBtn.innerText = "다시 테스트하기";
            predictBtn.disabled = false;
            
            // 결과창으로 스크롤
            resultContainer.scrollIntoView({ behavior: 'smooth' });
        });

        // 로또 로직
        function drawLotto() {
            const balls = document.getElementById('balls');
            balls.innerHTML = '';
            const nums = [];
            while(nums.length < 6) {
                const n = Math.floor(Math.random() * 45) + 1;
                if(!nums.includes(n)) nums.push(n);
            }
            nums.sort((a,b)=>a-b).forEach((n, i) => {
                setTimeout(() => {
                    const b = document.createElement('div');
                    const c = n<=10?'c1':n<=20?'c2':n<=30?'c3':n<=40?'c4':'c5';
                    b.className = `ball ${c}`;
                    b.innerText = n;
                    balls.appendChild(b);
                    setTimeout(() => b.classList.add('show'), 10);
                }, i * 100);
            });
        }

        // Disqus
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://buildtest-1.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
