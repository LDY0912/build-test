<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동물상 테스트 - 나를 닮은 동물은?</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --dog-color: #ff9f43;
            --cat-color: #54a0ff;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            margin-bottom: -60px;
        }

        header h1 { font-size: 2.8rem; margin: 0 0 15px 0; }
        header p { font-size: 1.2rem; opacity: 0.9; margin: 0; }

        main {
            width: 90%;
            max-width: 600px;
            z-index: 10;
        }

        .section-card {
            background: var(--card-bg);
            border-radius: 35px;
            padding: 40px;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
            text-align: center;
        }

        .upload-area {
            border: 4px dashed #dfe6e9;
            border-radius: 25px;
            padding: 50px 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            margin-bottom: 25px;
            background: #fff;
        }
        .upload-area:hover { border-color: var(--primary-color); background: #f1f0ff; transform: scale(1.01); }
        
        #image-preview {
            width: 100%;
            max-height: 450px;
            border-radius: 20px;
            display: none;
            object-fit: contain;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(108, 92, 231, 0.4); }
        .btn:active { transform: translateY(-1px); }
        .btn:disabled { background: #dfe6e9; color: #b2bec3; cursor: not-allowed; transform: none; box-shadow: none; }

        /* 결과 화면 강화 */
        #result-container {
            margin-top: 40px;
            padding: 30px;
            border-radius: 25px;
            background: #fdfdfd;
            border: 2px solid #f1f2f6;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .result-emoji { font-size: 5rem; margin-bottom: 15px; display: block; }
        .result-title { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
        .result-explain { font-size: 1.1rem; color: #636e72; margin-bottom: 25px; }
        
        /* 프로그레스 바 */
        .gauge-bar {
            width: 100%;
            height: 25px;
            background: #eee;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .gauge-fill {
            height: 100%;
            width: 0%;
            transition: width 1s ease-in-out;
            border-radius: 15px;
        }
        .dog-bg { background: linear-gradient(90deg, #ff9f43, #ff6b6b); }
        .cat-bg { background: linear-gradient(90deg, #54a0ff, #5f27cd); }

        /* 제휴 및 문의 */
        .contact-section h3 { font-size: 1.5rem; margin-top: 0; }
        .input-field {
            width: 100%; padding: 15px; margin-bottom: 15px; 
            border-radius: 12px; border: 1px solid #dfe6e9; 
            box-sizing: border-box; font-family: inherit; font-size: 1rem;
        }
        .input-field:focus { outline: none; border-color: var(--primary-color); }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .spinner {
            width: 60px; height: 60px; border: 6px solid #f3f3f3;
            border-top: 6px solid var(--primary-color);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 25px; font-weight: bold; font-size: 1.2rem;">AI 인공지능 모델 로딩 중...</p>
    </div>

    <header>
        <h1>🐾 AI 동물상 테스트</h1>
        <p>얼굴 사진으로 분석하는 나의 동물상</p>
    </header>

    <main>
        <section class="section-card">
            <div class="upload-area" onclick="document.getElementById('image-selector').click()">
                <div id="upload-label">
                    <span style="font-size: 4rem;">🖼️</span>
                    <p style="font-size: 1.2rem; font-weight: bold; margin-top: 15px;">클릭하여 사진 업로드</p>
                    <p style="color: #b2bec3; font-size: 0.9rem;">정면 사진일수록 정확도가 높습니다</p>
                </div>
                <img id="image-preview" src="" alt="미리보기">
            </div>
            <input type="file" id="image-selector" accept="image/*" style="display:none;">
            
            <button id="predict-btn" class="btn" disabled>AI 분석 시작하기</button>

            <div id="result-container">
                <span class="result-emoji" id="result-emoji"></span>
                <div class="result-title" id="result-title"></div>
                <div class="result-explain" id="result-explain"></div>
                
                <div class="gauge-bar">
                    <div id="gauge-fill" class="gauge-fill"></div>
                </div>
                <div id="percent-text" style="font-weight: bold; color: var(--primary-color); font-size: 1.2rem;"></div>
            </div>
        </section>

        <section class="section-card contact-section">
            <h3>🤝 제휴 및 서비스 문의</h3>
            <form action="https://formspree.io/f/xreoagkr" method="POST">
                <input type="email" name="email" class="input-field" placeholder="답변받을 이메일 주소" required>
                <textarea name="message" class="input-field" placeholder="문의 사항을 적어주세요" style="height: 120px; resize: none;" required></textarea>
                <button type="submit" class="btn" style="padding: 15px; font-size: 1.1rem;">문의 보내기</button>
            </form>
        </section>

        <div class="section-card">
            <div id="disqus_thread"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/EvFQgzXK7/";
        let model;

        const labelMap = {
            "dog": "강아지상",
            "cat": "고양이상"
        };

        const explainMap = {
            "dog": "다정다감하고 귀여운 매력을 가진 강아지상을 닮으셨네요! 주변 사람들에게 긍정적인 에너지를 주는 타입입니다.",
            "cat": "도도하고 지적인 분위기를 풍기는 매력적인 고양이상을 닮으셨네요! 신비로우면서도 세련된 인상을 줍니다."
        };

        async function init() {
            try {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                document.getElementById('loading-overlay').style.display = 'none';
            } catch (e) {
                alert("모델 로딩에 실패했습니다. 페이지를 새로고침 해주세요.");
            }
        }
        init();

        const imageSelector = document.getElementById('image-selector');
        const imagePreview = document.getElementById('image-preview');
        const uploadLabel = document.getElementById('upload-label');
        const predictBtn = document.getElementById('predict-btn');

        imageSelector.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imagePreview.src = event.target.result;
                    imagePreview.style.display = 'block';
                    uploadLabel.style.display = 'none';
                    predictBtn.disabled = false;
                    document.getElementById('result-container').style.display = 'none';
                    predictBtn.innerText = "AI 분석 시작하기";
                };
                reader.readAsDataURL(file);
            }
        });

        predictBtn.addEventListener('click', async () => {
            predictBtn.innerText = "분석 중...";
            predictBtn.disabled = true;

            const prediction = await model.predict(imagePreview);
            prediction.sort((a, b) => b.probability - a.probability);

            const best = prediction[0];
            const resultContainer = document.getElementById('result-container');
            const resultEmoji = document.getElementById('result-emoji');
            const resultTitle = document.getElementById('result-title');
            const resultExplain = document.getElementById('result-explain');
            const gaugeFill = document.getElementById('gauge-fill');
            const percentText = document.getElementById('percent-text');
            
            // 클래스명 매핑 (English -> Korean)
            const className = best.className.toLowerCase();
            const korName = labelMap[className] || best.className;
            const explain = explainMap[className] || "인공지능이 당신의 매력을 분석했습니다.";
            const emoji = className.includes("dog") ? "🐶" : (className.includes("cat") ? "🐱" : "✨");
            const probability = (best.probability * 100).toFixed(1);

            resultContainer.style.display = 'block';
            resultEmoji.innerText = emoji;
            resultTitle.innerHTML = `당신은 <strong>${korName}</strong>!`;
            resultExplain.innerText = explain;
            
            // 게이지 바 업데이트
            gaugeFill.style.width = '0%';
            gaugeFill.className = 'gauge-fill ' + (className.includes("dog") ? "dog-bg" : "cat-bg");
            
            setTimeout(() => {
                gaugeFill.style.width = probability + '%';
                percentText.innerText = probability + '% 일치';
            }, 100);

            predictBtn.innerText = "다른 사진으로 다시하기";
            predictBtn.disabled = false;
            
            window.scrollTo({ top: resultContainer.offsetTop - 100, behavior: 'smooth' });
        });

        // Disqus
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://buildtest-1.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
</body>
</html>
