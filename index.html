<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 번호 추첨기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }
        .container {
            background: #fff;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }
        #result {
            margin-bottom: 30px;
            min-height: 380px; /* 5줄이 들어갈 공간 미리 확보 */
        }
        .lotto-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px; /* 줄과 줄 사이 간격 */
        }
        .ball {
            width: 50px; /* 공 크기를 살짝 줄임 */
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            opacity: 0;
            transform: scale(0.5);
            animation: popIn 0.4s forwards;
        }
        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍀 행운의 로또 5게임 추첨기</h1>
        
        <div id="result">
            </div>

        <button onclick="generateLotto()">5게임 뽑기!</button>
    </div>

    <script>
        function generateLotto() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = ''; // 기존 번호 초기화

            // 5게임을 반복해서 생성
            for (let i = 0; i < 5; i++) {
                // 한 줄(row)을 감싸는 div 생성
                const rowDiv = document.createElement('div');
                rowDiv.className = 'lotto-row';

                // 1~45 숫자 중 중복 없이 6개 뽑기
                const numbers = [];
                while (numbers.length < 6) {
                    const randomNum = Math.floor(Math.random() * 45) + 1;
                    if (!numbers.includes(randomNum)) {
                        numbers.push(randomNum);
                    }
                }

                // 오름차순 정렬
                numbers.sort((a, b) => a - b);

                // 뽑힌 번호를 화면에 표시
                numbers.forEach((num, index) => {
                    // 시간차를 두고 공이 나타나도록 설정 (위에서 아래로, 좌에서 우로)
                    setTimeout(() => {
                        const ball = document.createElement('div');
                        ball.className = 'ball';
                        ball.textContent = num;

                        // 번호 대역별 색상 지정
                        if (num <= 10) ball.style.backgroundColor = '#fbc400';
                        else if (num <= 20) ball.style.backgroundColor = '#69c8f2';
                        else if (num <= 30) ball.style.backgroundColor = '#ff7272';
                        else if (num <= 40) ball.style.backgroundColor = '#aaa';
                        else ball.style.backgroundColor = '#b0d840';

                        rowDiv.appendChild(ball);
                    }, (i * 300) + (index * 100)); // 각 줄(i)과 각 공(index)마다 딜레이 부여
                });

                // 완성된 한 줄을 결과 영역에 추가
                resultDiv.appendChild(rowDiv);
            }
        }
    </script>

</body>
</html>
