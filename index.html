<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인생역전! 로또 번호 추첨기</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333;
            --accent-color: #ffcc00;
            --btn-color: #007bff;
            --btn-hover: #0056b3;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
            color: var(--text-color);
        }

        .container {
            background: var(--container-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            max-width: 500px;
            width: 90%;
            margin-bottom: 30px;
        }

        h1 { margin-bottom: 30px; font-size: 2rem; color: #222; }

        .balls-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            min-height: 60px;
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transform: scale(0);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ball.show { transform: scale(1); }

        .color-1 { background-color: #fbc400; }
        .color-2 { background-color: #69c8f2; }
        .color-3 { background-color: #ff7272; }
        .color-4 { background-color: #aaa; }
        .color-5 { background-color: #b0d840; }

        .draw-btn {
            background-color: var(--btn-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .draw-btn:hover { background-color: var(--btn-hover); }
        .draw-btn:active { transform: scale(0.98); }

        .history {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
            max-height: 100px;
            overflow-y: auto;
        }

        /* 제휴 문의 폼 스타일 */
        .contact-section {
            background: var(--container-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            max-width: 500px;
            width: 90%;
        }

        .contact-section h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .submit-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .submit-btn:hover { background-color: #218838; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍀 로또 추첨기</h1>
        <div class="balls-container" id="balls"></div>
        <button class="draw-btn" id="draw-btn">번호 추첨하기</button>
        <div class="history" id="history">최근 추첨 번호가 여기에 표시됩니다.</div>
    </div>

    <!-- 제휴 문의 섹션 -->
    <div class="contact-section">
        <h2>🤝 제휴 문의</h2>
        <form action="https://formspree.io/f/xreoagkr" method="POST">
            <div class="form-group">
                <label for="name">성함/업체명</label>
                <input type="text" id="name" name="name" required placeholder="예: 홍길동 / (주)로또컴퍼니">
            </div>
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required placeholder="제휴 관련 내용을 적어주세요."></textarea>
            </div>
            <button type="submit" class="submit-btn">문의하기</button>
        </form>
    </div>

    <!-- 댓글 섹션 -->
    <div class="contact-section" style="margin-top: 30px;">
        <h2>💬 댓글</h2>
        <div id="disqus_thread"></div>
        <script>
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://buildtest-1.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script>
        const ballsContainer = document.getElementById('balls');
        const drawBtn = document.getElementById('draw-btn');
        const historyDiv = document.getElementById('history');

        function getBallColorClass(num) {
            if (num <= 10) return 'color-1';
            if (num <= 20) return 'color-2';
            if (num <= 30) return 'color-3';
            if (num <= 40) return 'color-4';
            return 'color-5';
        }

        function drawNumbers() {
            const numbers = [];
            while (numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }
            numbers.sort((a, b) => a - b);

            ballsContainer.innerHTML = '';
            numbers.forEach((num, index) => {
                setTimeout(() => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${getBallColorClass(num)}`;
                    ball.textContent = num;
                    ballsContainer.appendChild(ball);
                    setTimeout(() => ball.classList.add('show'), 10);
                }, index * 150);
            });

            const time = new Date().toLocaleTimeString();
            const historyItem = document.createElement('p');
            historyItem.textContent = `[${time}] ${numbers.join(', ')}`;
            if (historyDiv.firstChild && historyDiv.firstChild.nodeType === 3) {
                historyDiv.innerHTML = '';
            }
            historyDiv.prepend(historyItem);
        }

        drawBtn.addEventListener('click', drawNumbers);
    </script>
</body>
</html>
